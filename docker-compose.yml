version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: firetrain-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fire_training
      MYSQL_USER: firetrain
      MYSQL_PASSWORD: firetrain
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    image: python:3.11-slim
    container_name: firetrain-gateway
    working_dir: /app
    command: sh -c "echo 'Gateway placeholder service. Replace with real app startup.' && sleep infinity"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./gateway:/app

  frontend:
    image: node:20-alpine
    container_name: firetrain-frontend
    working_dir: /app
    command: sh -c "echo 'Frontend placeholder service. Initialize Vite project later.' && sleep infinity"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  mysql_data:
