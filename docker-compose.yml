version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: firetrain-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fire_training
      MYSQL_USER: firetrain
      MYSQL_PASSWORD: firetrain
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - firetrain-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: firetrain-backend
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --ssl-keyfile=/app/certs/key.pem --ssl-certfile=/app/certs/cert.pem
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./fire_training.db
      - JWT_SECRET_KEY=dev-secret-key-not-for-production
      - LOG_LEVEL=DEBUG
      - DEBUG=true
    volumes:
      - ./backend:/app
      - ./data/models:/app/data/models
      - ./data/videos:/app/data/videos
      - ./certs:/app/certs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - firetrain-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: firetrain-frontend
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=https://localhost:8000/api
    volumes:
      - ./frontend:/app
    networks:
      - firetrain-network

volumes:
  mysql_data:

networks:
  firetrain-network:
    driver: bridge
